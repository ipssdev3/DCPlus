name: Continuous Integration

on: push

permissions: {}

jobs:
  tests:
    permissions:
      contents: read
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Setup Python and install dependencies
        uses: ./.github/actions/setup-python

      - name: Run tests with code coverage report
        shell: bash
        run: |
          uv run pytest tests \
            --cov=src \
            --cov-config=.coveragerc \
            --cov-report term-missing \
            --cov-report xml:coverage.xml
        env:
          CLEANUP_RAY_AFTER_TESTS: true

      - name: Upload coverage report
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7
        with:
          name: coverage
          path: coverage.xml
          retention-days: 7

  sonarqube:
    needs: [tests]
    if: success()
    permissions:
      contents: read
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          fetch-depth: 0

      - name: Download all coverage reports
        uses: actions/download-artifact@37930b1c2abaa49bbe596cd826c3c89aef350131
        with:
          pattern: coverage*
          merge-multiple: true
          path: .

      - name: SonarQube Scan
        uses: sonarsource/sonarqube-scan-action@a31c9398be7ace6bbfaf30c0bd5d415f843d45e9
        env:
          SONAR_TOKEN: ${{ secrets.SONARQUBE_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
      # Check the Quality Gate status.
      - name: SonarQube Quality Gate check
        id: sonarqube-quality-gate-check
        uses: sonarsource/sonarqube-quality-gate-action@cf038b0e0cdecfa9e56c198bbb7d21d751d62c3b
        with:
          pollingTimeoutSec: 600
        env:
          SONAR_TOKEN: ${{ secrets.SONARQUBE_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}

  code-quality-checks:
    permissions:
      contents: read
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Setup Python and install dependencies
        uses: ./.github/actions/setup-python

      - name: set PY
        run: echo "PY=$(python -VV | sha256sum | cut -d' ' -f1)" >> $GITHUB_ENV

      - name: Configure pre-commit cache
        uses: actions/cache@cdf6c1fa76f9f475f3d7449005a359c84ca0f306
        with:
          path: ~/.cache/pre-commit
          key: pre-commit|${{ env.PY }}|${{ hashFiles('.pre-commit-config.yaml') }}

      - name: Install pre-commit hooks
        run: uv run pre-commit install

      - name: Run code quality checks
        run: SKIP=no-commit-to-branch uv run pre-commit run --all-files

  license-headers:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Check out repository code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: License Header Check
        uses: B1NARY-GR0UP/nwa@924fd990a1769a8198a3cc5d2a83f72a41a51951
        with:
          version: latest # (optional) version of nwa to use; default: latest
          cmd: check # (optional) command to execute; options: `check`, `add`, `update`, `remove`; default: check
          path: .nwa-config.yaml # (optional) configuration file path; default: .nwa-config.yaml

  fossa-scan:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Check out repository code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - id: fossa-analyze
        uses: fossas/fossa-action@c414b9ad82eaad041e47a7cf62a4f02411f427a0 # Use a specific version if locking is preferred
        with:
          api-key: ${{secrets.FOSSA_API_KEY}}
          run-tests: false # Add another run with run-tests: true if ci should fail on issues

      - id: fossa-test
        uses: fossas/fossa-action@c414b9ad82eaad041e47a7cf62a4f02411f427a0 # Use a specific version if locking is preferred
        with:
          api-key: ${{secrets.FOSSA_API_KEY}}
          run-tests: true # Add another run with run-tests: true if ci should fail on issues

  test-docs-build:
    permissions:
      contents: read
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Setup Python and install dependencies
        uses: ./.github/actions/setup-python
        with:
          sync-args: "--only-group doc --frozen"

      - name: Conditional Deployment
        run: uv run mkdocs build

  ci-success-check:
    needs:
      [
        code-quality-checks,
        fossa-scan,
        license-headers,
        sonarqube,
        tests,
        test-docs-build,
      ]
    if: always()
    permissions:
      contents: read
    runs-on: ubuntu-latest
    steps:
      - name: Check all job results
        run: |
          echo "Code Quality: ${{ needs.code-quality-checks.result }}"
          echo "FOSSA Scan: ${{ needs.fossa-scan.result }}"
          echo "License Headers: ${{ needs.license-headers.result }}"
          echo "SonarQube: ${{ needs.sonarqube.result }}"
          echo "Tests: ${{ needs.tests.result }}"
          echo "Test Docs Build: ${{ needs.test-docs-build.result }}"

          if [[ "${{ needs.code-quality-checks.result }}" != "success" ]] || \
             [[ "${{ needs.fossa-scan.result }}" != "success" ]] || \
             [[ "${{ needs.license-headers.result }}" != "success" ]] || \
             [[ "${{ needs.sonarqube.result }}" != "success" ]] || \
             [[ "${{ needs.tests.result }}" != "success" ]] || \
             [[ "${{ needs.test-docs-build.result }}" != "success" ]]; then
            echo "One or more CI jobs failed, were cancelled, or skipped. Marking as failed."
            exit 1
          fi
          echo "All CI jobs succeeded."

# Project identification
sonar.projectKey=DCPlus
sonar.projectName=DCPlus
sonar.projectVersion=1.0

# Source code location
sonar.sources=src
sonar.tests=tests

# Python specific settings
sonar.python.version=3.11

# Encoding
sonar.sourceEncoding=UTF-8

# Test execution reports (coverage)
# Update these paths based on your test runner output
sonar.python.coverage.reportPaths=coverage.xml

# Coverage exclusions
sonar.coverage.exclusions=\
    **/tests/**,\
    **/__pycache__/**,\
    **/__init__.py,\

# Duplications exclusions
sonar.cpd.exclusions=\
    **/tests/**,\
    **/notebooks/**

# General exclusions
sonar.exclusions=\
    **/__pycache__/**,\
    **/*.pyc,\
    **/venv/**,\
    **/.venv/**,\
    **/env/**,\
    **/.env/**,\
    **/docs/**,\
    **/.pytest_cache/**,\
    **/.git/**
